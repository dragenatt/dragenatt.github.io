/* ── AssetSearch Component ── */
function AssetSearch({onSelect}){
  const[q,setQ]=useState('');
  const[open,setOpen]=useState(false);
  const ref=useRef();

  const results=useMemo(()=>{
    if(!q.trim())return[];
    const lq=q.toLowerCase();
    return ASSET_DB.filter(a=>a.s.toLowerCase().includes(lq)||a.n.toLowerCase().includes(lq)||a.cat.toLowerCase().includes(lq)).slice(0,10);
  },[q]);

  useEffect(()=>{
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',handler);return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const pick=a=>{onSelect(a);setQ('');setOpen(false);};

  return(
    <div ref={ref} style={{position:'relative'}}>
      <label style={LBL}>BUSCAR ACTIVO</label>
      <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
        placeholder="🔍  Apple, Bitcoin, SPY, TSLA…" style={{...INP,paddingLeft:10}}/>
      {open&&results.length>0&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'1px solid #E2E8F0',borderRadius:10,zIndex:999,boxShadow:'0 8px 24px rgba(0,0,0,0.10)',maxHeight:310,overflowY:'auto',marginTop:2}}>
          {results.map(a=>(
            <div key={a.s} className="asset-option" onClick={()=>pick(a)}
              style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid #F8FAFC',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:38,height:38,borderRadius:10,background:a.t==='crypto'?'#FEF3C7':a.t==='etf'?'#EDE9FE':'#EFF6FF',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontSize:13,fontWeight:800,color:a.t==='crypto'?'#D97706':a.t==='etf'?'#7C3AED':'#2563EB'}}>{a.s.split('.')[0].slice(0,4)}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:'#0F172A'}}>{a.s} <span style={{fontWeight:400,color:'#64748B'}}>— {a.n}</span></div>
                <div style={{fontSize:11,color:'#94A3B8',marginTop:1}}>{a.cat}</div>
              </div>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:12,flexShrink:0,
                background:a.t==='crypto'?'#FEF3C7':a.t==='etf'?'#EDE9FE':'#EFF6FF',
                color:a.t==='crypto'?'#D97706':a.t==='etf'?'#7C3AED':'#2563EB',fontWeight:600}}>
                {a.t==='crypto'?'Cripto':a.t==='etf'?'ETF':'Acción'}
              </span>
            </div>
          ))}
        </div>
      )}
      {open&&q.length>1&&results.length===0&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'1px solid #E2E8F0',borderRadius:10,zIndex:999,boxShadow:'0 8px 24px rgba(0,0,0,0.10)',padding:'16px',textAlign:'center',fontSize:13,color:'#94A3B8',marginTop:2}}>
          Sin resultados para "<b>{q}</b>" — puedes ingresarlo manualmente abajo.
        </div>
      )}
    </div>
  );
}

/* ── Proxy fetch chains ── */
const YF_PROXIES=[
  sym=>`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`)}`,
  sym=>`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`)}`,
];

async function fetchYahoo(sym){
  for(const mk of YF_PROXIES){
    try{
      const r=await fetch(mk(sym),{signal:AbortSignal.timeout(7000)});
      if(!r.ok)continue;
      const d=await r.json();
      const q=d?.chart?.result?.[0];
      if(!q)continue;
      const price=q.meta?.regularMarketPrice,prev=q.meta?.chartPreviousClose;
      if(price&&price>0)return{price,change_pct:prev&&prev>0?((price-prev)/prev)*100:0};
    }catch{}
  }
  return null;
}

async function fetchCoinGecko(ids){
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error();
    return await r.json();
  }catch{return{};}
}

async function fetchAllPrices(assets){
  const result={};
  if(!assets?.length)return result;
  const cryptos=assets.filter(a=>CG_IDS[a.symbol]||a.assetType==='crypto');
  const stocks=assets.filter(a=>!CG_IDS[a.symbol]&&a.assetType!=='crypto');
  if(cryptos.length){
    const ids=[...new Set(cryptos.map(a=>CG_IDS[a.symbol]||a.symbol.toLowerCase()))].join(',');
    const data=await fetchCoinGecko(ids);
    cryptos.forEach(a=>{const id=CG_IDS[a.symbol]||a.symbol.toLowerCase(),row=data[id];if(row?.usd)result[a.symbol]={price:row.usd,change_pct:row.usd_24h_change??0,mktcap:row.usd_market_cap??null};});
  }
  if(stocks.length){
    const syms=[...new Set(stocks.map(a=>a.symbol))];
    await Promise.allSettled(syms.map(async sym=>{const r=await fetchYahoo(sym);if(r)result[sym]=r;}));
  }
  return result;
}

async function loadNews(){
  const feeds=['https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC&region=US&lang=en-US','https://finance.yahoo.com/news/rssindex'];
  for(const feed of feeds){
    try{const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=24`,{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.items?.length)return d.items;}catch{}
  }
  return[];
}

/* ── Monte Carlo ── */
function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function runMC({S0,mu,sigma,T,N}){
  if(S0<=0||sigma<=0||T<=0||N<=0)return null;
  const dt=1/252,drift=(mu-sigma*sigma/2)*dt,vol=sigma*Math.sqrt(dt);
  const paths=[];
  for(let i=0;i<N;i++){const p=new Float64Array(T+1);p[0]=S0;for(let t=1;t<=T;t++)p[t]=p[t-1]*Math.exp(drift+vol*randn());paths.push(p);}
  const nPts=Math.min(T,80),step=T/nPts;
  const cps=Array.from({length:nPts+1},(_,i)=>Math.min(T,Math.round(i*step)));
  const pct=(arr,p)=>{const s=[...arr].sort((a,b)=>a-b),idx=(p/100)*(s.length-1),lo=Math.floor(idx),hi=Math.ceil(idx);return+(s[lo]+(s[hi]-s[lo])*(idx-lo)).toFixed(4);};
  const bands=cps.map(t=>{const v=paths.map(p=>p[t]);return{t,p5:pct(v,5),p25:pct(v,25),p50:pct(v,50),p75:pct(v,75),p95:pct(v,95)};});
  const finals=paths.map(p=>p[T]),p5f=pct(finals,5),p50f=pct(finals,50),p95f=pct(finals,95);
  const tail=finals.filter(v=>v<p5f);
  return{bands,p5:p5f,p50:p50f,p95:p95f,probGain:finals.filter(v=>v>S0).length/N*100,VaR95:S0-p5f,CVaR95:S0-(tail.length?tail.reduce((s,v)=>s+v,0)/tail.length:p5f),retEsp:(p50f-S0)/S0*100};
}

function exportCSV(rows,fname){
  if(!rows?.length)return;
  const keys=Object.keys(rows[0]);
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>`"${String(r[k]).replace(/"/g,'""')}"`).join(','))].join('\n');
  Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),download:fname}).click();
}

/* ── Donut SVG ── */
function Donut({data,total}){
  if(!data?.length||!total)return null;
  const cx=100,cy=100,R=80,r=52,rad=d=>(d-90)*Math.PI/180;let angle=0;
  const sl=data.map((d,i)=>{const s=angle;angle+=d.value/total*360;return{...d,s,e:angle,c:COLORS[i%COLORS.length]};});
  const arc=(s,e)=>{if(e-s>=360)e=359.9999;const[a1,a2]=[rad(s),rad(e)],lg=e-s>180?1:0;return`M${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}A${R} ${R} 0 ${lg} 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}L${cx+r*Math.cos(a2)} ${cy+r*Math.sin(a2)}A${r} ${r} 0 ${lg} 0 ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)}Z`;};
  return(<svg viewBox="0 0 200 200" width={190} height={190}>{sl.map((s,i)=><path key={i} d={arc(s.s,s.e)} fill={s.c} stroke="white" strokeWidth={2}/>)}</svg>);
}

/* ── MC Chart SVG ── */
function MCChart({result,S0}){
  if(!result?.bands||result.bands.length<2)return null;
  const W=580,H=270,PL=76,PR=30,PT=16,PB=40;
  const{bands}=result,T=bands[bands.length-1].t;
  const av=bands.flatMap(b=>[b.p5,b.p95]).filter(isFinite);
  if(!av.length)return null;
  const mn=Math.min(...av)*0.97,mx=Math.max(...av)*1.03;
  const xs=t=>PL+(t/T)*(W-PL-PR),ys=v=>PT+(1-(v-mn)/(mx-mn))*(H-PT-PB);
  const line=k=>bands.map((b,i)=>`${i===0?'M':'L'}${xs(b.t).toFixed(1)},${ys(b[k]).toFixed(1)}`).join(' ');
  const band=(k1,k2)=>line(k1)+' '+[...bands].reverse().map(b=>`L${xs(b.t).toFixed(1)},${ys(b[k2]).toFixed(1)}`).join(' ')+'Z';
  const yVals=Array.from({length:5},(_,i)=>mn+(mx-mn)*i/4);
  const xStep=T<=63?10:T<=252?42:84;
  const xVals=[];for(let t=0;t<=T;t+=xStep)xVals.push(t);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
      <defs><linearGradient id="g1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#4F46E5" stopOpacity=".15"/><stop offset="100%" stopColor="#4F46E5" stopOpacity=".02"/></linearGradient></defs>
      {yVals.map((v,i)=><g key={i}><line x1={PL} y1={ys(v)} x2={W-PR} y2={ys(v)} stroke="#F1F5F9" strokeWidth="1"/><text x={PL-6} y={ys(v)+4} textAnchor="end" fontSize="10" fill="#94A3B8">{fmtK(v)}</text></g>)}
      {xVals.map((t,i)=><text key={i} x={xs(t)} y={H-8} textAnchor="middle" fontSize="10" fill="#94A3B8">d{t}</text>)}
      <path d={band('p5','p95')} fill="url(#g1)"/>
      <path d={band('p25','p75')} fill="#4F46E520"/>
      <path d={line('p95')} fill="none" stroke="#4F46E540" strokeWidth="1" strokeDasharray="4,3"/>
      <path d={line('p5')} fill="none" stroke="#EF444440" strokeWidth="1" strokeDasharray="4,3"/>
      <path d={line('p50')} fill="none" stroke="#4F46E5" strokeWidth="2.5" strokeLinejoin="round"/>
      <line x1={PL} y1={ys(S0)} x2={W-PR} y2={ys(S0)} stroke="#94A3B8" strokeDasharray="5,4" strokeWidth="1"/>
      <text x={W-PR+4} y={ys(S0)+4} fontSize="9" fill="#94A3B8">Inicial</text>
    </svg>
  );
}

              <button onClick={doMC} disabled={mcBusy||totV<=0} style={{...BTN(),width:'100%',opacity:(mcBusy||totV<=0)?0.65:1}}>{mcBusy?'⟳ Simulando…':'▶ Ejecutar Simulación'}</button>
              {totV<=0&&<div style={{fontSize:11,color:red,marginTop:6,textAlign:'center'}}>Agrega activos primero</div>}
              <div style={{marginTop:14,padding:12,background:'#F8FAFC',borderRadius:10,fontSize:11,color:'#64748B',lineHeight:1.7}}><b>μ</b> — retorno anual esperado<br/><b>σ</b> — volatilidad anual<br/><b>VaR 95%</b> — pérdida máx. con 95% confianza<br/><b>CVaR 95%</b> — pérdida promedio en el peor 5%</div>
            </div>
            <div>
              {!mcRes&&!mcBusy?(<div style={{...CARD,textAlign:'center',padding:72}}><div style={{fontSize:56}}>🎲</div><div style={{color:'#64748B',marginTop:14,fontWeight:600,fontSize:15}}>Configura y ejecuta la simulación</div><div style={{color:'#94A3B8',fontSize:13,marginTop:6}}>Se generarán <b>{mc.N.toLocaleString()}</b> trayectorias para <b>{mc.T}</b> días</div></div>)
              :mcBusy?(<div style={{...CARD,textAlign:'center',padding:72}}><div style={{fontSize:44}}>⟳</div><div style={{color:'#64748B',marginTop:14}}>Ejecutando {mc.N.toLocaleString()} simulaciones…</div></div>)
              :mcRes&&(<div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:14}}>
                  {[['VALOR MEDIANO (p50)',fmtUSD(mcRes.p50),`en ${mc.T} días`,null],['PROB. GANANCIA',fmt(mcRes.probGain,1)+'%','escenarios positivos',mcRes.probGain-50],['RETORNO ESPERADO',(mcRes.retEsp>=0?'+':'')+fmt(mcRes.retEsp,2)+'%','sobre valor inicial',mcRes.retEsp],['ESCENARIO PESIMISTA (p5)',fmtUSD(mcRes.p5),'peor 5%',mcRes.p5-totV],['VaR 95%',fmtUSD(mcRes.VaR95),'pérdida máx. 95% conf.',-1],['ESCENARIO OPTIMISTA (p95)',fmtUSD(mcRes.p95),'mejor 5%',1]].map(([lbl,val,sub,pnl])=>(
                    <div key={lbl} style={{...CARD,padding:14}}><div style={{fontSize:10,color:'#94A3B8',marginBottom:6,fontWeight:600,letterSpacing:'0.05em'}}>{lbl}</div><div style={{fontSize:18,fontWeight:700,color:pnl!=null?pc(pnl):'#0F172A'}}>{val}</div><div style={{fontSize:11,color:'#94A3B8',marginTop:3}}>{sub}</div></div>
                  ))}
                </div>
                <div style={CARD}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#0F172A'}}>Distribución de Trayectorias</div>
                    <div style={{display:'flex',gap:12,fontSize:11,color:'#94A3B8'}}>
                      {[['#4F46E5','Mediana'],['#4F46E540','p25-p75'],['#4F46E515','p5-p95']].map(([c,l])=><span key={l} style={{display:'flex',alignItems:'center',gap:4}}><span style={{display:'inline-block',width:16,height:3,background:c,borderRadius:2}}/>{l}</span>)}
                    </div>
                  </div>
                  <MCChart result={mcRes} S0={totV}/>
                </div>
              </div>)}
            </div>
          </div>
        )}

        {/* ═══ TRANSACCIONES ═══ */}
        {tab==='transactions'&&(
          <div>
            <div style={{...CARD,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:600,color:'#0F172A',marginBottom:14}}>Registrar Operación</div>

              {/* Buscador principal */}
              <div style={{marginBottom:16}}>
                <AssetSearch onSelect={onAssetSelect}/>
                {form.symbol&&(
                  <div style={{marginTop:8,padding:'10px 14px',background:'#EEF2FF',borderRadius:10,display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:36,height:36,borderRadius:8,background:'#4F46E5',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontSize:12,fontWeight:800,color:'white'}}>{form.symbol.slice(0,4)}</span>
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'#4F46E5'}}>{form.symbol}</div>
                      <div style={{fontSize:11,color:'#6366F1'}}>{form.name}</div>
                    </div>
                    <button onClick={()=>setForm(f=>({...f,symbol:'',name:''}))} style={{marginLeft:'auto',background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:18}}>×</button>
                  </div>
                )}
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr 1fr',gap:10}}>
                {[['ACCIÓN','action','select',null,[['buy','🟢 Compra'],['sell','🔴 Venta']]],['TIPO','assetType','select',null,[['stock','Acción'],['crypto','Cripto'],['etf','ETF'],['bond','Bono']]],['SÍMBOLO (manual)','symbol','text','AAPL',null],['NOMBRE','name','text','Apple Inc.',null],['CANTIDAD','quantity','number','10',null],['PRECIO (USD)','price','number','150.00',null]].map(([lbl,key,type,ph,opts])=>(
                  <div key={key}><label style={LBL}>{lbl}</label>
                    {type==='select'?<select value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={INP}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
                    :<input type={type} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={ph} style={INP} onKeyDown={e=>{if(e.key==='Enter')handleAdd();}}/>}
                  </div>
                ))}
              </div>
              {formErr&&<div style={{color:red,fontSize:12,marginTop:10}}>⚠ {formErr}</div>}
              <div style={{display:'flex',gap:8,marginTop:14}}>
                <button onClick={handleAdd} style={BTN()}>+ Registrar</button>
                <button onClick={()=>exportCSV(txs.map(t=>({Date:fmtDate(t.date),Type:t.assetType,Action:t.action,Symbol:t.symbol,Name:t.name,Qty:t.quantity,Price:t.price,Total:+(t.quantity*t.price).toFixed(2)})),'transacciones.csv')} style={BTN('white')}>⬇ CSV</button>
              </div>
            </div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:600,color:'#0F172A'}}>Historial ({txs.length})</div>
              {txs.length>0&&<button onClick={()=>{if(window.confirm('¿Borrar todo el historial?'))setTxs([]);}} style={BTN('white',true)}>🗑 Borrar todo</button>}
            </div>
            {txs.length===0?(<div style={{...CARD,textAlign:'center',padding:52}}><div style={{fontSize:44}}>📋</div><div style={{color:'#64748B',marginTop:12}}>Sin transacciones aún.</div></div>):(
              <div style={{...CARD,padding:0,overflow:'hidden'}}><div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead><tr style={{background:'#F8FAFC'}}>{['Fecha','Tipo','Acción','Símbolo','Nombre','Cantidad','Precio','Total',''].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                  <tbody>{txs.map((tx,i)=>(<tr key={tx.id} style={{background:i%2===0?'white':'#FAFAFA'}}><td style={{...TD,color:'#94A3B8',fontSize:12,whiteSpace:'nowrap'}}>{fmtDate(tx.date)}</td><td style={TD}><span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'#EEF2FF',color:'#4F46E5'}}>{tx.assetType}</span></td><td style={TD}><span style={{fontSize:11,padding:'3px 10px',borderRadius:20,fontWeight:600,...(tx.action==='buy'?{background:'#ECFDF5',color:'#059669'}:{background:'#FEF2F2',color:'#DC2626'})}}>{tx.action==='buy'?'▲ COMPRA':'▼ VENTA'}</span></td><td style={{...TD,fontWeight:700,color:'#4F46E5'}}>{tx.symbol}</td><td style={{...TD,color:'#64748B'}}>{tx.name}</td><td style={TD}>{fmt(tx.quantity,4)}</td><td style={TD}>{fmtUSD(tx.price)}</td><td style={{...TD,fontWeight:600}}>{fmtUSD(tx.quantity*tx.price)}</td><td style={TD}><button onClick={()=>setTxs(p=>p.filter(t=>t.id!==tx.id))} style={{background:'none',border:'none',color:red,cursor:'pointer',fontSize:20,padding:'0 4px'}}>×</button></td></tr>))}</tbody>
                </table>
              </div></div>
            )}
          </div>
        )}

        {/* ═══ NOTICIAS ═══ */}
        {tab==='news'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div><div style={{fontSize:15,fontWeight:600,color:'#0F172A'}}>Noticias Financieras</div><div style={{fontSize:12,color:'#94A3B8'}}>Fuente: Yahoo Finance RSS</div></div>
              <button onClick={getNews} disabled={newsLoad} style={{...BTN(),opacity:newsLoad?0.6:1}}>{newsLoad?'⟳ Cargando…':'↻ Actualizar'}</button>
            </div>
            {newsLoad?(<div style={{...CARD,textAlign:'center',padding:64}}><div style={{fontSize:38}}>⟳</div><div style={{color:'#94A3B8',marginTop:12}}>Cargando noticias…</div></div>)
            :newsErr?(<div style={{...CARD,textAlign:'center',padding:64}}><div style={{fontSize:38}}>⚠️</div><div style={{color:red,marginTop:12}}>{newsErr}</div><button onClick={getNews} style={{...BTN(),marginTop:16}}>Reintentar</button></div>)
            :news.length===0?(<div style={{...CARD,textAlign:'center',padding:64}}><div style={{fontSize:52}}>📰</div><div style={{color:'#64748B',marginTop:14,fontWeight:500}}>Presiona <b>Actualizar</b> para cargar noticias.</div></div>)
            :(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
                {news.map((n,i)=>(
                  <a key={i} href={n.link||'#'} target="_blank" rel="noreferrer" style={{...CARD,display:'block',cursor:'pointer',transition:'box-shadow .2s'}} onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.10)'} onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,0.06)'}>
                    {n.thumbnail&&<img src={n.thumbnail} alt="" style={{width:'100%',height:124,objectFit:'cover',borderRadius:10,marginBottom:10,display:'block'}} onError={e=>e.target.style.display='none'}/>}
                    <div style={{fontSize:11,color:'#4F46E5',marginBottom:4,fontWeight:600}}>{n.author||'Yahoo Finance'}</div>
                    <div style={{fontSize:13,fontWeight:600,color:'#0F172A',lineHeight:1.45,marginBottom:8}}>{n.title}</div>
                    <div style={{fontSize:12,color:'#94A3B8',lineHeight:1.45,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{(n.description||'').replace(/<[^>]*>/g,'')}</div>
                    <div style={{fontSize:11,color:'#CBD5E1',marginTop:8}}>{n.pubDate?fmtDate(n.pubDate):''}</div>
                  </a>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
