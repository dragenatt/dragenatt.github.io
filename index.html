<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',system-ui,sans-serif;background:#F8FAFC}
a{text-decoration:none}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:3px}</style>

<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── Utils ──
const fmt    = (n,d=2)=>new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtUSD = n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);
const fmtK   = n=>n>=1e9?fmt(n/1e9,2)+'B':n>=1e6?fmt(n/1e6,2)+'M':fmtUSD(n);
const fmtDate= iso=>new Date(iso).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime= d=>d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
const pc     = v=>v>=0?'#10B981':'#EF4444';
const COLORS = ['#4F46E5','#7C3AED','#0891B2','#059669','#D97706','#DC2626','#EC4899','#0EA5E9','#84CC16','#F59E0B'];

// ── Styles ──
const C={background:'white',borderRadius:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #F1F5F9',padding:20};
const I={width:'100%',padding:'8px 10px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit',background:'white'};
const TH={padding:'10px 14px',textAlign:'left',fontWeight:600,color:'#94A3B8',fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap'};
const TD={padding:'10px 14px',fontSize:13,color:'#0F172A',borderTop:'1px solid #F1F5F9'};
const btn=(bg='#4F46E5',sm)=>({padding:sm?'6px 12px':'9px 18px',background:bg,color:bg==='white'?'#64748B':'white',border:bg==='white'?'1px solid #E2E8F0':'none',borderRadius:8,fontSize:sm?12:13,cursor:'pointer',fontWeight:500,fontFamily:'inherit'});

// ── Storage ──
const store={
  get:k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ── Crypto IDs (CoinGecko) ──
const CG={BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',ADA:'cardano',
  DOGE:'dogecoin',DOT:'polkadot',MATIC:'matic-network',AVAX:'avalanche-2',LINK:'chainlink',
  LTC:'litecoin',ATOM:'cosmos',NEAR:'near',UNI:'uniswap',TRX:'tron',SHIB:'shiba-inu',
  APT:'aptos',ARB:'arbitrum',OP:'optimism',PEPE:'pepe',WIF:'dogwifcoin'};

// ── Price fetching ──
async function fetchAllPrices(assets){
  const result={};
  const cryptos=assets.filter(a=>CG[a.symbol]||a.assetType==='crypto');
  const stocks=assets.filter(a=>!CG[a.symbol]&&a.assetType!=='crypto');
  if(cryptos.length){
    try{
      const ids=[...new Set(cryptos.map(a=>CG[a.symbol]||a.symbol.toLowerCase()))].join(',');
      const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
      const d=await r.json();
      cryptos.forEach(a=>{const id=CG[a.symbol]||a.symbol.toLowerCase();if(d[id])result[a.symbol]={price:d[id].usd,change_pct:d[id].usd_24h_change??0,mktcap:d[id].usd_market_cap};});
    }catch(e){console.warn('CG',e);}
  }
  if(stocks.length){
    const syms=[...new Set(stocks.map(a=>a.symbol))];
    await Promise.all(syms.map(async sym=>{
      try{
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
        const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        const d=await r.json();
        const q=d?.chart?.result?.[0];
        if(q){const p=q.meta?.regularMarketPrice,prev=q.meta?.chartPreviousClose;
          if(p)result[sym]={price:p,change_pct:prev&&p?((p-prev)/prev)*100:0};}
      }catch(e){console.warn(`YF ${sym}`,e);}
    }));
  }
  return result;
}

// ── News ──
async function loadNews(){
  const url='https://finance.yahoo.com/news/rssindex';
  const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=24`);
  const d=await r.json();
  return d.items||[];
}

// ── Monte Carlo (GBM) ──
function randn(){let u,v;do{u=Math.random();}while(!u);do{v=Math.random();}while(!v);return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function runMC({S0,mu,sigma,T,N=500}){
  const dt=1/252,drift=(mu-sigma*sigma/2)*dt,vol=sigma*Math.sqrt(dt);
  const all=[];
  for(let i=0;i<N;i++){
    const p=new Float64Array(T+1);p[0]=S0;
    for(let t=1;t<=T;t++)p[t]=p[t-1]*Math.exp(drift+vol*randn());
    all.push(p);
  }
  const nPts=Math.min(T,90),step=T/nPts;
  const pts=Array.from({length:nPts+1},(_,i)=>Math.round(i*step));
  const pct=(arr,p)=>{const s=[...arr].sort((a,b)=>a-b),i=(p/100)*(s.length-1),lo=Math.floor(i),hi=Math.ceil(i);return s[lo]+(s[hi]-s[lo])*(i-lo);};
  const bands=pts.map(t=>{const v=all.map(p=>p[t]);return{t,p5:pct(v,5),p25:pct(v,25),p50:pct(v,50),p75:pct(v,75),p95:pct(v,95)};});
  const finals=all.map(p=>p[T]);
  const p5f=pct(finals,5);
  return{bands,p5:p5f,p50:pct(finals,50),p95:pct(finals,95),
    probGain:finals.filter(v=>v>S0).length/N*100,
    VaR95:S0-p5f,
    CVaR95:S0-(finals.filter(v=>v<p5f).reduce((s,v,_,a)=>s+v/a.length,0)||p5f),
    retEsp:(pct(finals,50)-S0)/S0*100};
}

// ── CSV Export ──
function exportCSV(rows,name){
  if(!rows.length)return;
  const ks=Object.keys(rows[0]);
  const csv=[ks.join(','),...rows.map(r=>ks.map(k=>`"${r[k]}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=name;a.click();
}

// ── Donut Chart ──
function Donut({data,total}){
  if(!data?.length||!total)return null;
  const cx=100,cy=100,R=80,r=52,tr=d=>(d-90)*Math.PI/180;
  let a=0;
  const sl=data.map((d,i)=>{const s=a;a+=d.value/total*360;return{...d,s,e:a,c:COLORS[i%COLORS.length]};});
  const arc=(s,e)=>{if(e-s>=360)e=359.999;const[a1,a2]=[tr(s),tr(e)],lg=e-s>180?1:0;
    return`M${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}A${R} ${R} 0 ${lg} 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}L${cx+r*Math.cos(a2)} ${cy+r*Math.sin(a2)}A${r} ${r} 0 ${lg} 0 ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)}Z`;};
  return(<svg viewBox="0 0 200 200" width={190} height={190}>{sl.map((s,i)=><path key={i} d={arc(s.s,s.e)} fill={s.c} stroke="white" strokeWidth={2}/>)}</svg>);
}

// ── MC Chart ──
function MCChart({result,S0}){
  if(!result?.bands?.length<2)return null;
  const W=580,H=270,P={l:72,r:20,t:15,b:38};
  const{bands}=result,T=bands[bands.length-1].t;
  const av=bands.flatMap(b=>[b.p5,b.p95]);
  const mn=Math.min(...av)*0.97,mx=Math.max(...av)*1.03;
  const xs=t=>P.l+(t/T)*(W-P.l-P.r),ys=v=>P.t+(1-(v-mn)/(mx-mn))*(H-P.t-P.b);
  const lp=k=>bands.map((b,i)=>`${i===0?'M':'L'}${xs(b.t)},${ys(b[k])}`).join(' ');
  const area=(k1,k2)=>lp(k1)+' '+[...bands].reverse().map(b=>`L${xs(b.t)},${ys(b[k2])}`).join(' ')+'Z';
  const nT=5,yTks=Array.from({length:nT},(_,i)=>mn+(mx-mn)*i/(nT-1));
  const xStep=T<=90?15:T<=180?30:T<=365?60:120;
  const xTks=[];for(let t=0;t<=T;t+=xStep)xTks.push(t);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      <defs><linearGradient id="mcg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#4F46E5" stopOpacity=".18"/><stop offset="100%" stopColor="#4F46E5" stopOpacity=".04"/></linearGradient></defs>
      {yTks.map((v,i)=><line key={i} x1={P.l} y1={ys(v)} x2={W-P.r} y2={ys(v)} stroke="#F1F5F9" strokeWidth="1"/>)}
      <path d={area('p5','p95')} fill="url(#mcg)"/>
      <path d={area('p25','p75')} fill="#4F46E528"/>
      <path d={lp('p95')} fill="none" stroke="#4F46E555" strokeWidth="1" strokeDasharray="3,3"/>
      <path d={lp('p5')} fill="none" stroke="#EF444455" strokeWidth="1" strokeDasharray="3,3"/>
      <path d={lp('p50')} fill="none" stroke="#4F46E5" strokeWidth="2.5"/>
      <line x1={P.l} y1={ys(S0)} x2={W-P.r} y2={ys(S0)} stroke="#94A3B8" strokeDasharray="5,4" strokeWidth="1"/>
      {yTks.map((v,i)=><text key={i} x={P.l-5} y={ys(v)+4} textAnchor="end" fontSize="10" fill="#94A3B8">{fmtK(v)}</text>)}
      {xTks.map((t,i)=><text key={i} x={xs(t)} y={H-8} textAnchor="middle" fontSize="10" fill="#94A3B8">d{t}</text>)}
    </svg>
  );
}

// ── Main App ──
function App(){
  const[tab,setTab]=useState('dashboard');
  const[assets,setAssets]=useState([]);
  const[txs,setTxs]=useState([]);
  const[prices,setPrices]=useState({});
  const[fetching,setFetching]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(null);
  const[countdown,setCountdown]=useState(60);
  const[priceErr,setPriceErr]=useState('');
  const[form,setForm]=useState({symbol:'',name:'',assetType:'stock',quantity:'',price:'',action:'buy'});
  const[formErr,setFormErr]=useState('');
  const[mc,setMc]=useState({mu:8,sigma:20,T:252,N:500});
  const[mcRes,setMcRes]=useState(null);
  const[mcRun,setMcRun]=useState(false);
  const[news,setNews]=useState([]);
  const[newsLoad,setNewsLoad]=useState(false);
  const assetsRef=useRef(assets);
  assetsRef.current=assets;

  useEffect(()=>{setAssets(store.get('pf:assets')||[]);setTxs(store.get('pf:txs')||[]);},[]);
  useEffect(()=>{store.set('pf:assets',assets);},[assets]);
  useEffect(()=>{store.set('pf:txs',txs);},[txs]);

  const doFetch=useCallback(async(list)=>{
    const a=list??assetsRef.current;if(!a.length)return;
    setFetching(true);setPriceErr('');setCountdown(60);
    try{const p=await fetchAllPrices(a);setPrices(p);setLastUpdate(new Date());}
    catch(e){setPriceErr('Error al obtener precios.');}
    setFetching(false);
  },[]);

  useEffect(()=>{doFetch();const iv=setInterval(()=>doFetch(),60000);return()=>clearInterval(iv);},[doFetch]);
  useEffect(()=>{const iv=setInterval(()=>setCountdown(c=>c>0?c-1:60),1000);return()=>clearInterval(iv);},[]);
  useEffect(()=>{if(tab==='news'&&!news.length)getNews();},[tab]);

  const getNews=async()=>{setNewsLoad(true);try{setNews(await loadNews());}catch(e){}setNewsLoad(false);};

  const handleAdd=()=>{
    const{symbol,name,assetType,quantity,price,action}=form;
    if(!symbol.trim())return setFormErr('Ingresa un símbolo.');
    if(!quantity||isNaN(+quantity)||+quantity<=0)return setFormErr('Cantidad inválida.');
    if(!price||isNaN(+price)||+price<=0)return setFormErr('Precio inválido.');
    setFormErr('');
    const sym=symbol.toUpperCase().trim(),qty=parseFloat(quantity),prc=parseFloat(price);
    setTxs(p=>[{id:Date.now(),symbol:sym,name:name||sym,assetType,action,quantity:qty,price:prc,date:new Date().toISOString()},...p]);
    const upd=(()=>{
      const prev=[...assets],ex=prev.find(a=>a.symbol===sym);
      if(action==='buy'){
        if(ex){const nq=ex.quantity+qty,na=(ex.avgPrice*ex.quantity+prc*qty)/nq;return prev.map(a=>a.symbol===sym?{...a,quantity:nq,avgPrice:na,name:name||a.name}:a);}
        return[...prev,{id:Date.now(),symbol:sym,name:name||sym,assetType,quantity:qty,avgPrice:prc}];
      }else{if(!ex)return prev;const nq=ex.quantity-qty;return nq<=0.0001?prev.filter(a=>a.symbol!==sym):prev.map(a=>a.symbol===sym?{...a,quantity:nq}:a);}
    })();
    setAssets(upd);setForm({symbol:'',name:'',assetType:'stock',quantity:'',price:'',action:'buy'});
    setTimeout(()=>doFetch(upd),800);
  };

  const doMC=()=>{
    setMcRun(true);
    setTimeout(()=>{
      setMcRes(runMC({S0:totV||10000,mu:mc.mu/100,sigma:mc.sigma/100,T:mc.T,N:mc.N}));
      setMcRun(false);
    },50);
  };

  const gP=sym=>prices[sym]?.price??null;
  const gC=sym=>prices[sym]?.change_pct??null;
  const gV=a=>a.quantity*(gP(a.symbol)??a.avgPrice);
  const totV=assets.reduce((s,a)=>s+gV(a),0);
  const totC=assets.reduce((s,a)=>s+a.quantity*a.avgPrice,0);
  const totPnL=totV-totC,totPct=totC>0?(totPnL/totC)*100:0;
  const dayChg=assets.reduce((s,a)=>{const c=gC(a.symbol);if(c==null)return s;const v=gV(a);return s+v*(c/(100+c));},0);
  const pie=assets.map(a=>({name:a.symbol,value:gV(a)}));

  const TABS=[['dashboard','📊 Dashboard'],['assets','💼 Activos'],['montecarlo','🎲 Monte Carlo'],['transactions','🔄 Transacciones'],['news','📰 Noticias']];

  const Label=({t})=><label style={{fontSize:10,color:'#64748B',display:'block',marginBottom:4,fontWeight:600,letterSpacing:'0.05em'}}>{t}</label>;

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:'#F8FAFC',minHeight:'100vh'}}>

      {/* Header */}
      <div style={{background:'white',borderBottom:'1px solid #F1F5F9',padding:'12px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,background:'linear-gradient(135deg,#4F46E5,#7C3AED)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>📈</div>
          <div><div style={{fontSize:16,fontWeight:700,color:'#0F172A'}}>Mi Cartera Pro</div><div style={{fontSize:11,color:'#94A3B8'}}>Investment Portfolio Manager</div></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:24}}>
          <div style={{fontSize:11,color:'#94A3B8',textAlign:'right'}}>
            {fetching?<span style={{color:'#4F46E5'}}>⟳ Actualizando…</span>
             :priceErr?<span style={{color:'#EF4444'}}>{priceErr}</span>
             :lastUpdate?<>Actualizado {fmtTime(lastUpdate)} · próx. <b style={{color:'#4F46E5'}}>{countdown}s</b></>
             :assets.length?'Cargando precios…':'Agrega tu primer activo'}
          </div>
          <div style={{textAlign:'right',...(totV>0?{}:{display:'none'})}}>
            <div style={{fontSize:10,color:'#94A3B8',fontWeight:600,letterSpacing:'0.05em'}}>PORTAFOLIO TOTAL</div>
            <div style={{fontSize:20,fontWeight:700,color:'#0F172A'}}>{fmtUSD(totV)}</div>
            <div style={{fontSize:11,color:pc(totPnL),textAlign:'right'}}>{totPnL>=0?'+':''}{fmtUSD(totPnL)} ({totPct>=0?'+':''}{fmt(totPct)}%)</div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:'white',borderBottom:'1px solid #F1F5F9',padding:'0 24px',display:'flex',overflowX:'auto'}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:'12px 18px',border:'none',borderBottom:tab===k?'2px solid #4F46E5':'2px solid transparent',background:'none',color:tab===k?'#4F46E5':'#64748B',fontWeight:tab===k?600:400,fontSize:13,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'inherit',marginBottom:-1}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{padding:'20px 24px',maxWidth:1160,margin:'0 auto'}}>

        {/* ─── DASHBOARD ─── */}
        {tab==='dashboard'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:18}}>
              {[['VALOR TOTAL',fmtUSD(totV),`${assets.length} activo${assets.length!==1?'s':''}`,null],
                ['P&L TOTAL',(totPnL>=0?'+':'')+fmtUSD(totPnL),(totPct>=0?'+':'')+fmt(totPct)+'%',totPnL],
                ['CAMBIO HOY',(dayChg>=0?'+':'')+fmtUSD(dayChg),'Variación 24h',dayChg],
                ['COSTO BASE',fmtUSD(totC),'Capital invertido',null],
              ].map(([lbl,val,sub,pnl])=>(
                <div key={lbl} style={C}>
                  <div style={{fontSize:10,color:'#94A3B8',marginBottom:8,fontWeight:600,letterSpacing:'0.06em'}}>{lbl}</div>
                  <div style={{fontSize:22,fontWeight:700,color:pnl!=null?pc(pnl):'#0F172A',lineHeight:1.1}}>{val}</div>
                  <div style={{fontSize:12,color:pnl!=null?pc(pnl):'#94A3B8',marginTop:5}}>{sub}</div>
                </div>
              ))}
            </div>
            {assets.length===0?(
              <div style={{...C,textAlign:'center',padding:60}}>
                <div style={{fontSize:48}}>📭</div>
                <div style={{color:'#64748B',marginTop:12,fontWeight:500}}>No tienes activos aún.</div>
                <div style={{color:'#94A3B8',fontSize:13,marginTop:4}}>Ve a <b>Transacciones</b> para registrar tu primera compra.</div>
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:'230px 1fr',gap:16}}>
                <div style={C}>
                  <div style={{fontSize:13,fontWeight:600,color:'#0F172A',marginBottom:12}}>Distribución</div>
                  <div style={{display:'flex',justifyContent:'center'}}><Donut data={pie} total={totV}/></div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,justifyContent:'center',marginTop:8}}>
                    {pie.map((d,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:3,fontSize:11,color:'#64748B'}}>
                        <div style={{width:7,height:7,borderRadius:'50%',background:COLORS[i%COLORS.length]}}/>
                        {d.name} {totV>0?fmt(d.value/totV*100,1):0}%
                      </div>
                    ))}
                  </div>
                </div>
                <div style={C}>
                  <div style={{fontSize:13,fontWeight:600,color:'#0F172A',marginBottom:12}}>Posiciones</div>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{background:'#F8FAFC'}}>{['Activo','Cant.','Precio Prom.','Precio Actual','Valor','P&L $','P&L %','24h'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                    <tbody>
                      {[...assets].sort((a,b)=>gV(b)-gV(a)).map((a)=>{
                        const cp=gP(a.symbol),val=gV(a),cost=a.quantity*a.avgPrice,pnl=val-cost,pp=cost>0?(pnl/cost)*100:0,chg=gC(a.symbol);
                        return(<tr key={a.id}>
                          <td style={TD}><span style={{fontWeight:700,color:'#4F46E5'}}>{a.symbol}</span><span style={{fontSize:11,color:'#94A3B8',marginLeft:5}}>{a.name}</span></td>
                          <td style={TD}>{fmt(a.quantity,4)}</td>
                          <td style={TD}>{fmtUSD(a.avgPrice)}</td>
                          <td style={TD}>{cp?fmtUSD(cp):<span style={{color:'#CBD5E1'}}>—</span>}</td>
                          <td style={{...TD,fontWeight:600}}>{fmtUSD(val)}</td>
                          <td style={{...TD,fontWeight:600,color:pc(pnl)}}>{pnl>=0?'+':''}{fmtUSD(pnl)}</td>
                          <td style={{...TD,fontWeight:600,color:pc(pp)}}>{pp>=0?'+':''}{fmt(pp)}%</td>
                          <td style={{...TD,color:chg!=null?pc(chg):'#CBD5E1'}}>{chg!=null?`${chg>=0?'+':''}${fmt(chg)}%`:'—'}</td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── ACTIVOS ─── */}
        {tab==='assets'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:600,color:'#0F172A'}}>Mis Activos</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>exportCSV(assets.map(a=>({Symbol:a.symbol,Name:a.name,Type:a.assetType,Quantity:a.quantity,AvgPrice:fmt(a.avgPrice),CurrentPrice:gP(a.symbol)??'N/A',Value:fmt(gV(a)),PnL:fmt(gV(a)-a.quantity*a.avgPrice)})),'activos.csv')} style={btn('white',true)}>⬇ CSV</button>
                <button onClick={()=>doFetch()} disabled={fetching} style={{...btn(),opacity:fetching?0.6:1}}>{fetching?'⟳ Actualizando…':'↻ Actualizar precios'}</button>
              </div>
            </div>
            {assets.length===0?(
              <div style={{...C,textAlign:'center',padding:60}}><div style={{fontSize:48}}>📭</div><div style={{color:'#64748B',marginTop:12}}>Sin activos registrados.</div></div>
            ):(
              <div style={{...C,padding:0,overflow:'hidden'}}>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{background:'#F8FAFC'}}>{['Símbolo','Nombre','Tipo','Cantidad','Precio Prom.','Precio Actual','Valor','P&L $','P&L %','Cambio 24h','Mkt Cap'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                    <tbody>
                      {assets.map((a,i)=>{
                        const cp=gP(a.symbol),val=gV(a),cost=a.quantity*a.avgPrice,pnl=val-cost,pp=cost>0?(pnl/cost)*100:0,chg=gC(a.symbol),mc2=prices[a.symbol]?.mktcap;
                        return(<tr key={a.id} style={{background:i%2===0?'white':'#FAFAFA'}}>
                          <td style={{...TD,fontWeight:700,color:'#4F46E5'}}>{a.symbol}</td>
                          <td style={{...TD,color:'#64748B'}}>{a.name}</td>
                          <td style={TD}><span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'#EEF2FF',color:'#4F46E5'}}>{a.assetType}</span></td>
                          <td style={TD}>{fmt(a.quantity,4)}</td>
                          <td style={TD}>{fmtUSD(a.avgPrice)}</td>
                          <td style={TD}>{cp?fmtUSD(cp):<span style={{color:'#CBD5E1'}}>—</span>}</td>
                          <td style={{...TD,fontWeight:600}}>{fmtUSD(val)}</td>
                          <td style={{...TD,fontWeight:600,color:pc(pnl)}}>{pnl>=0?'+':''}{fmtUSD(pnl)}</td>
                          <td style={{...TD,fontWeight:600,color:pc(pp)}}>{pp>=0?'+':''}{fmt(pp)}%</td>
                          <td style={{...TD,color:chg!=null?pc(chg):'#CBD5E1'}}>{chg!=null?`${chg>=0?'+':''}${fmt(chg)}%`:'—'}</td>
                          <td style={{...TD,color:'#64748B'}}>{mc2?fmtK(mc2):'—'}</td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── MONTE CARLO ─── */}
        {tab==='montecarlo'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16,alignItems:'start'}}>
              <div style={C}>
                <div style={{fontSize:14,fontWeight:600,color:'#0F172A',marginBottom:4}}>⚙️ Parámetros</div>
                <div style={{fontSize:11,color:'#94A3B8',marginBottom:16}}>Simulación mediante Movimiento Browniano Geométrico (GBM)</div>

                <div style={{marginBottom:12}}>
                  <Label t="VALOR INICIAL (portafolio)"/>
                  <input disabled value={fmtUSD(totV||10000)} style={{...I,background:'#F8FAFC',color:'#94A3B8'}}/>
                </div>

                {[['RETORNO ANUAL ESPERADO (μ %)',mc.mu,v=>setMc(p=>({...p,mu:v})),'ej. 8 = 8% anual'],
                  ['VOLATILIDAD ANUAL (σ %)',mc.sigma,v=>setMc(p=>({...p,sigma:v})),'ej. 20 = 20% anual'],
                ].map(([lbl,val,set,ph])=>(
                  <div key={lbl} style={{marginBottom:12}}>
                    <Label t={lbl}/>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <input type="range" min="1" max={lbl.includes('μ')?50:100} step="0.5" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{flex:1,accentColor:'#4F46E5'}}/>
                      <input type="number" value={val} onChange={e=>set(parseFloat(e.target.value)||0)} style={{...I,width:60,padding:'6px 8px'}}/>
                    </div>
                  </div>
                ))}

                <div style={{marginBottom:12}}>
                  <Label t="HORIZONTE TEMPORAL"/>
                  <select value={mc.T} onChange={e=>setMc(p=>({...p,T:+e.target.value}))} style={I}>
                    {[[30,'30 días'],[63,'3 meses'],[126,'6 meses'],[252,'1 año'],[504,'2 años'],[756,'3 años']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>

                <div style={{marginBottom:18}}>
                  <Label t="NÚMERO DE SIMULACIONES"/>
                  <select value={mc.N} onChange={e=>setMc(p=>({...p,N:+e.target.value}))} style={I}>
                    {[[200,'200 — rápido'],[500,'500 — estándar'],[1000,'1,000 — preciso']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>

                <button onClick={doMC} disabled={mcRun} style={{...btn(),width:'100%',opacity:mcRun?0.7:1}}>
                  {mcRun?'⟳ Simulando…':'▶ Ejecutar Monte Carlo'}
                </button>

                <div style={{marginTop:14,padding:12,background:'#F8FAFC',borderRadius:10,fontSize:11,color:'#64748B',lineHeight:1.6}}>
                  <b>μ</b> = retorno anual esperado<br/>
                  <b>σ</b> = volatilidad anual del portafolio<br/>
                  <b>VaR 95%</b> = pérdida máx. con 95% confianza<br/>
                  <b>CVaR</b> = pérdida promedio en el peor 5%
                </div>
              </div>

              <div>
                {!mcRes?(
                  <div style={{...C,textAlign:'center',padding:70}}>
                    <div style={{fontSize:52}}>🎲</div>
                    <div style={{color:'#64748B',marginTop:14,fontWeight:500,fontSize:15}}>Configura los parámetros y ejecuta la simulación</div>
                    <div style={{color:'#94A3B8',fontSize:13,marginTop:6}}>Se generarán <b>{mc.N.toLocaleString()}</b> trayectorias para <b>{mc.T}</b> días de trading</div>
                  </div>
                ):(
                  <div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:14}}>
                      {[['VALOR MEDIANO ESPERADO',fmtUSD(mcRes.p50),`en ${mc.T} días`,null],
                        ['PROB. DE GANANCIA',fmt(mcRes.probGain,1)+'%','de obtener retorno positivo',mcRes.probGain-50],
                        ['VaR 95%',fmtUSD(mcRes.VaR95),'pérdida máxima con 95% confianza',-1],
                        ['ESCENARIO PESIMISTA (p5)',fmtUSD(mcRes.p5),'peor 5% de simulaciones',mcRes.p5-(totV||10000)],
                        ['RETORNO ESPERADO',(mcRes.retEsp>=0?'+':'')+fmt(mcRes.retEsp)+'%','sobre valor inicial',mcRes.retEsp],
                        ['ESCENARIO OPTIMISTA (p95)',fmtUSD(mcRes.p95),'mejor 5% de simulaciones',1],
                      ].map(([lbl,val,sub,pnl])=>(
                        <div key={lbl} style={{...C,padding:14}}>
                          <div style={{fontSize:10,color:'#94A3B8',marginBottom:6,fontWeight:600,letterSpacing:'0.05em'}}>{lbl}</div>
                          <div style={{fontSize:18,fontWeight:700,color:pnl!=null?pc(pnl):'#0F172A'}}>{val}</div>
                          <div style={{fontSize:11,color:'#94A3B8',marginTop:3}}>{sub}</div>
                        </div>
                      ))}
                    </div>
                    <div style={C}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                        <div style={{fontSize:13,fontWeight:600,color:'#0F172A'}}>Distribución de Trayectorias</div>
                        <div style={{display:'flex',gap:14,fontSize:11,color:'#94A3B8'}}>
                          {[['#4F46E5','Mediana'],['#4F46E540','p25-p75'],['#4F46E515','p5-p95'],['#CBD5E1','Valor inicial']].map(([c,l])=>(
                            <span key={l} style={{display:'flex',alignItems:'center',gap:4}}>
                              <span style={{display:'inline-block',width:18,height:3,background:c,borderRadius:2}}/>
                              {l}
                            </span>
                          ))}
                        </div>
                      </div>
                      <MCChart result={mcRes} S0={totV||10000}/>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ─── TRANSACCIONES ─── */}
        {tab==='transactions'&&(
          <div>
            <div style={{...C,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:600,color:'#0F172A',marginBottom:4}}>Registrar Operación</div>
              <div style={{fontSize:12,color:'#94A3B8',marginBottom:14}}>
                Cripto: BTC ETH SOL BNB XRP ADA DOGE… · Acciones: AAPL TSLA AMZN NVDA GOOGL MSFT… · ETFs: SPY QQQ VOO VTI…
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10}}>
                {[['ACCIÓN','action','select',null,[['buy','🟢 Compra'],['sell','🔴 Venta']]],
                  ['TIPO','assetType','select',null,[['stock','Acción'],['crypto','Cripto'],['etf','ETF'],['bond','Bono']]],
                  ['SÍMBOLO','symbol','text','AAPL / BTC',null],
                  ['NOMBRE','name','text','Apple Inc.',null],
                  ['CANTIDAD','quantity','number','10',null],
                  ['PRECIO (USD)','price','number','150.00',null],
                ].map(([lbl,key,type,ph,opts])=>(
                  <div key={key}>
                    <Label t={lbl}/>
                    {type==='select'
                      ?<select value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={I}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
                      :<input type={type} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={ph} style={I}/>
                    }
                  </div>
                ))}
              </div>
              {formErr&&<div style={{color:'#EF4444',fontSize:12,marginTop:10}}>{formErr}</div>}
              <div style={{display:'flex',gap:8,marginTop:14}}>
                <button onClick={handleAdd} style={btn()}>+ Registrar</button>
                <button onClick={()=>exportCSV(txs,'transacciones.csv')} style={btn('white')}>⬇ Exportar CSV</button>
              </div>
            </div>

            <div style={{fontSize:14,fontWeight:600,color:'#0F172A',marginBottom:12}}>Historial ({txs.length})</div>
            {txs.length===0?(
              <div style={{...C,textAlign:'center',padding:50}}><div style={{fontSize:40}}>📋</div><div style={{color:'#64748B',marginTop:12}}>Sin transacciones.</div></div>
            ):(
              <div style={{...C,padding:0,overflow:'hidden'}}>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{background:'#F8FAFC'}}>{['Fecha','Tipo','Acción','Símbolo','Nombre','Cantidad','Precio','Total',''].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                    <tbody>
                      {txs.map((tx,i)=>(
                        <tr key={tx.id} style={{background:i%2===0?'white':'#FAFAFA'}}>
                          <td style={{...TD,color:'#94A3B8',fontSize:12,whiteSpace:'nowrap'}}>{fmtDate(tx.date)}</td>
                          <td style={TD}><span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'#EEF2FF',color:'#4F46E5'}}>{tx.assetType}</span></td>
                          <td style={TD}><span style={{fontSize:11,padding:'3px 10px',borderRadius:20,fontWeight:600,...(tx.action==='buy'?{background:'#ECFDF5',color:'#059669'}:{background:'#FEF2F2',color:'#DC2626'})}}>{tx.action==='buy'?'▲ COMPRA':'▼ VENTA'}</span></td>
                          <td style={{...TD,fontWeight:700,color:'#4F46E5'}}>{tx.symbol}</td>
                          <td style={{...TD,color:'#64748B'}}>{tx.name}</td>
                          <td style={TD}>{fmt(tx.quantity,4)}</td>
                          <td style={TD}>{fmtUSD(tx.price)}</td>
                          <td style={{...TD,fontWeight:600}}>{fmtUSD(tx.quantity*tx.price)}</td>
                          <td style={TD}><button onClick={()=>setTxs(p=>p.filter(t=>t.id!==tx.id))} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── NOTICIAS ─── */}
        {tab==='news'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,color:'#0F172A'}}>Noticias Financieras</div>
                <div style={{fontSize:12,color:'#94A3B8'}}>Fuente: Yahoo Finance</div>
              </div>
              <button onClick={getNews} disabled={newsLoad} style={{...btn(),opacity:newsLoad?0.6:1}}>{newsLoad?'⟳ Cargando…':'↻ Actualizar'}</button>
            </div>
            {newsLoad?(
              <div style={{...C,textAlign:'center',padding:60}}><div style={{fontSize:36,animation:'spin 1s linear infinite'}}>⟳</div><div style={{color:'#94A3B8',marginTop:12}}>Cargando noticias…</div></div>
            ):news.length===0?(
              <div style={{...C,textAlign:'center',padding:60}}><div style={{fontSize:48}}>📰</div><div style={{color:'#64748B',marginTop:12}}>Presiona <b>Actualizar</b> para cargar noticias.</div></div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
                {news.map((n,i)=>(
                  <a key={i} href={n.link} target="_blank" rel="noreferrer" style={{...C,display:'block',cursor:'pointer',transition:'transform 0.15s,box-shadow 0.15s'}}>
                    {n.thumbnail&&<img src={n.thumbnail} alt="" style={{width:'100%',height:128,objectFit:'cover',borderRadius:10,marginBottom:10,display:'block'}} onError={e=>e.target.style.display='none'}/>}
                    <div style={{fontSize:11,color:'#4F46E5',marginBottom:5,fontWeight:600}}>{n.author||'Yahoo Finance'}</div>
                    <div style={{fontSize:13,fontWeight:600,color:'#0F172A',lineHeight:1.45,marginBottom:8}}>{n.title}</div>
                    <div style={{fontSize:12,color:'#94A3B8',lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{n.description?.replace(/<[^>]*>/g,'')}</div>
                    <div style={{fontSize:11,color:'#CBD5E1',marginTop:8}}>{n.pubDate?fmtDate(n.pubDate):''}</div>
                  </a>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
